<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Notes Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>University Notes Assistant</h1>
      <p>Upload your PDF notes, ingest them, and ask exam-prep questions.</p>
    </header>
     

    <!-- upload pdf session  -->
    <section class="panel">
      <h2>1. Upload PDF</h2>
      <div class="row">
        <input type="file" id="fileInput" accept=".pdf" />
        <button id="uploadBtn">Upload</button>
      </div>
      <p id="uploadStatus" class="status"></p>
    </section>
    
    <!-- Ingestion section when user press -->
    <section class="panel">
      <h2>2. Ingest Notes</h2>
      <div class="row">
        <button id="ingestBtn">Ingest Uploaded PDF</button>
      </div>
      <p id="ingestStatus" class="status"></p>
    </section>
 
    <!-- # this session show the current document details -->
    <section class="panel">
      <h2>Current Document</h2>
      <div id="docStatus" class="status-box">
        Loading current status...
      </div>
    </section>

    <section class="panel chat-panel">
      <h2>3. Ask Questions</h2>
      <div class="ask-box">
        <textarea id="questionInput" rows="4" placeholder="Ask a question from your uploaded notes..."></textarea>
        <button id="askBtn">Ask</button>
      </div>

      <!-- This container shows all Q/A blocks.
           We are NOT saving history in the backend yet.
           We are only keeping previous messages visible in the frontend. -->
      <div id="chatContainer" class="chat-container"></div>
    </section>
  </div>

  <script src="/static/main.js"></script>
</body>
</html>
